<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIS FIBER · Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="js/users.js"></script>
<script src="js/auth.js"></script>
<style>
:root{--red:#C0152A;--red2:#9E0E20;--off:#F7F5F4;--ink:#1A0A0C;--ink3:#9A7078;--border:#E8DCDE}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit',sans-serif}
body{
  display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:#0a0508;
  background-image:
    radial-gradient(ellipse 70% 50% at 50% 0%, rgba(192,21,42,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 80% 80%, rgba(192,21,42,0.08) 0%, transparent 60%);
}
.login-wrap{
  width:100%;max-width:420px;padding:1.5rem;
}
.brand{text-align:center;margin-bottom:2.5rem}
.brand-logo{
  width:64px;height:64px;border-radius:18px;background:var(--red);
  display:inline-flex;align-items:center;justify-content:center;
  margin-bottom:1rem;box-shadow:0 8px 32px rgba(192,21,42,0.5);
}
.brand-logo svg{width:30px;height:30px;stroke:#fff}
.brand-name{font-size:26px;font-weight:700;color:#fff;letter-spacing:-.01em}
.brand-name span{color:rgba(255,255,255,0.35);font-weight:300}
.brand-sub{font-size:12px;font-family:'JetBrains Mono',monospace;color:rgba(255,255,255,0.3);margin-top:4px;letter-spacing:.1em;text-transform:uppercase}
.card{
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;padding:2rem;backdrop-filter:blur(16px);
}
.card-title{font-size:17px;font-weight:600;color:#fff;margin-bottom:.3rem}
.card-sub{font-size:13px;color:rgba(255,255,255,0.35);margin-bottom:1.75rem}
.field{margin-bottom:1.25rem}
.field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,0.4);margin-bottom:6px}
.field input{
  width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);
  border-radius:10px;padding:11px 14px;font-size:14px;color:#fff;font-family:'Outfit',sans-serif;
  outline:none;transition:border-color .18s,background .18s;
}
.field input::placeholder{color:rgba(255,255,255,0.2)}
.field input:focus{border-color:rgba(192,21,42,0.7);background:rgba(192,21,42,0.06)}
.btn-login{
  width:100%;background:var(--red);border:none;border-radius:10px;
  padding:13px;font-size:15px;font-weight:700;color:#fff;font-family:'Outfit',sans-serif;
  cursor:pointer;transition:all .18s;box-shadow:0 4px 16px rgba(192,21,42,0.4);
  margin-top:.25rem;
}
.btn-login:hover{background:var(--red2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(192,21,42,0.5)}
.btn-login:active{transform:translateY(0)}
.btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none}
.error-msg{
  background:rgba(192,21,42,0.12);border:1px solid rgba(192,21,42,0.3);
  border-radius:8px;padding:10px 14px;font-size:13px;color:#ff8896;
  margin-bottom:1rem;display:none;
}
.error-msg.show{display:block}
.footer-note{text-align:center;margin-top:1.5rem;font-size:11px;font-family:'JetBrains Mono',monospace;color:rgba(255,255,255,0.15)}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="brand">
    <div class="brand-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/>
        <circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
      </svg>
    </div>
    <div class="brand-name">FIS <span>FIBER</span></div>
    <div class="brand-sub">Sistema de Indicadores</div>
  </div>

  <div class="card">
    <div class="card-title">Iniciar sesión</div>
    <div class="card-sub">Ingresa tus credenciales para continuar</div>

    <div class="error-msg" id="err-msg">Usuario o contraseña incorrectos.</div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="field">
        <label>Usuario</label>
        <input type="text" id="inp-user" placeholder="tu.usuario" autocomplete="username" required>
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="inp-pass" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login" id="btn-login">Entrar al sistema</button>
    </form>
  </div>

  <div class="footer-note">FIS FIBER · Control Operativo · Acceso restringido</div>
</div>

<script>
// Si ya tiene sesión activa, redirige directo a la app
if (sessionStorage.getItem('fis_session')) {
  window.location.replace('app.html');
}

function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-login');
  const err = document.getElementById('err-msg');
  const user = document.getElementById('inp-user').value;
  const pass = document.getElementById('inp-pass').value;

  btn.disabled = true;
  btn.textContent = 'Verificando…';
  err.classList.remove('show');

  setTimeout(() => {
    const result = fisLogin(user, pass);
    if (result.ok) {
      window.location.replace('app.html');
    } else {
      err.textContent = result.error;
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Entrar al sistema';
      document.getElementById('inp-pass').value = '';
      document.getElementById('inp-pass').focus();
    }
  }, 400);
}
</script>
</body>
</html>
