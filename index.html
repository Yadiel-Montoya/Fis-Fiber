<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIS FIBER · Indicadores</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
:root{
  --red:#C0152A;--red2:#9E0E20;--red3:#E8192F;--red-soft:rgba(192,21,42,0.08);--red-mid:rgba(192,21,42,0.15);
  --white:#FFFFFF;--off:#F7F5F4;--off2:#F0ECEB;
  --ink:#1A0A0C;--ink2:#5C3038;--ink3:#9A7078;
  --border:#E8DCDE;--border2:#D4C0C4;
  --green:#1A9E5C;--green-bg:rgba(26,158,92,0.09);
  --blue:#1A5FA0;--blue-bg:rgba(26,95,160,0.09);
  --amber:#B87A10;--amber-bg:rgba(184,122,16,0.09);
  --teal:#1A9E82;--teal-bg:rgba(26,158,130,0.09);
  --sidebar:240px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--off);color:var(--ink);min-height:100vh;display:flex;overflow-x:hidden}

/* LOGIN OVERLAY */
#login-overlay { position: fixed; inset: 0; background: #0D0608; z-index: 10000; display: flex; align-items: center; justify-content: center; }
.login-card { background: var(--white); padding: 40px; border-radius: 20px; width: 100%; max-width: 360px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }

.sidebar{width:var(--sidebar);min-width:var(--sidebar);height:100vh;position:fixed;top:0;left:0;z-index:200;background:var(--red);display:flex;flex-direction:column;box-shadow:4px 0 24px rgba(192,21,42,0.18)}
.sidebar-brand{padding:2rem 1.5rem 1.5rem;border-bottom:1px solid rgba(255,255,255,0.12)}
.brand-name{font-size:20px;font-weight:700;color:#fff;line-height:1.1}
.sidebar-nav{flex:1;padding:1.25rem 0;overflow-y:auto}
.nav-section{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,0.35);padding:0 1.5rem;margin:1.25rem 0 .5rem;font-family:'JetBrains Mono',monospace}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 1.5rem;font-size:13px;font-weight:500;color:rgba(255,255,255,0.65);cursor:pointer;transition:all .18s;border-left:3px solid transparent}
.nav-item.active{color:#fff;background:rgba(255,255,255,0.13);border-left-color:#fff}
.main{margin-left:var(--sidebar);flex:1;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;min-width:0}
.topbar{height:52px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;position:sticky;top:0;z-index:100}
.page{display:none;flex:1;padding:2rem;width:100%}
.page.active{display:block}
.overview-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px}
.area-card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:1.75rem;cursor:pointer;position:relative;transition:all .2s}
.area-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,0.09)}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:1.5rem}
.chart-box{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:1.5rem}
.chart-box.full{grid-column:1/-1}
.table-wrap{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:1.5rem}
table{width:100%;border-collapse:collapse}
thead th{font-size:10px;text-transform:uppercase;padding:10px 1.25rem;text-align:left;background:var(--off)}
tbody td{font-size:13px;padding:14px 1.25rem;border-bottom:1px solid var(--border)}
/* ESTILOS DE SLIDESHOW Y OTROS DEL ORIGINAL SE MANTIENEN IGUAL */
</style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h2 style="margin-bottom:10px">FIS <span style="color:var(--red)">FIBER</span></h2>
        <p style="font-size:12px; color:var(--ink3); margin-bottom:25px">INICIO DE SESIÓN</p>
        <input type="text" id="log-email" class="filter-input" style="width:100%; margin-bottom:10px" placeholder="admin@fisfiber.com">
        <input type="password" id="log-pass" class="filter-input" style="width:100%; margin-bottom:20px" placeholder="••••••••">
        <button class="filter-btn" style="width:100%" onclick="checkAuth()">ENTRAR</button>
        <p id="log-error" style="color:var(--red); font-size:12px; margin-top:15px; display:none">Credenciales inválidas</p>
    </div>
</div>

<div id="app-content" style="display:none">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand"><div class="brand-name">FIS <span>FIBER</span></div></div>
      <nav class="sidebar-nav" id="sidebar-nav-content"></nav>
      <div class="sidebar-footer">
        <div id="clock" class="clock-val"></div>
        <button onclick="logout()" style="background:none; border:none; color:#fff; cursor:pointer; font-size:10px; margin-top:10px">CERRAR SESIÓN</button>
      </div>
    </aside>
    <div class="main">
      <header class="topbar">
        <div id="bc-current" style="font-weight:600">Resumen</div>
        <div id="user-info" style="font-size:11px; font-family:'JetBrains Mono'"></div>
      </header>
      <div class="page active" id="page-home">
        <h1 class="page-title">Indicadores <span>FIS FIBER</span></h1>
        <div class="overview-grid" id="home-grid"></div>
      </div>
      <div class="page" id="page-detail"><div id="detail-body"></div></div>
    </div>
</div>

<script>
/* ══ SISTEMA DE USUARIOS ══ */
let appUsers = JSON.parse(localStorage.getItem('fisfiber_users')) || [
    { email: "admin@fisfiber.com", pass: "admin123", name: "Admin", role: "admin", permisos: ["maquilas", "ventas", "logistica", "operaciones", "vigilancia"] }
];
let activeUser = null;

function checkAuth() {
    const e = document.getElementById('log-email').value, p = document.getElementById('log-pass').value;
    const u = appUsers.find(x => x.email === e && x.pass === p);
    if(u){ activeUser=u; localStorage.setItem('fisfiber_session', JSON.stringify(u)); startApp(); }
    else document.getElementById('log-error').style.display='block';
}

function startApp() {
    document.getElementById('login-overlay').style.display='none';
    document.getElementById('app-content').style.display='block';
    document.getElementById('user-info').textContent = `USUARIO: ${activeUser.email.toUpperCase()}`;
    renderMenu(); renderHome();
}

function logout() { localStorage.removeItem('fisfiber_session'); location.reload(); }

/* ══ CONFIGURACIÓN DE ÁREAS (USANDO TUS DATOS ORIGINALES) ══ */
const areas = {
    maquilas: { name:'Maquilas', desc:'Producción y eficiencia', color:'var(--blue)', bgColor:'var(--blue-bg)', submods:[] },
    ventas: { name:'Ventas', desc:'Cumplimiento de metas', color:'var(--green)', bgColor:'var(--green-bg)', submods:[] },
    logistica: { 
        name:'Logística', desc:'Cargas, Colaboradores y Casetas', color:'var(--red)', bgColor:'var(--red-soft)',
        submods:[
            {id:'cargas', label:'📦 Cargas', render:renderCargas},
            {id:'colab', label:'👥 Colaboradores', render:renderColaboradores},
            {id:'casetas', label:'🛣️ Casetas', render:renderCasetas}
        ] 
    },
    operaciones: { name:'Operaciones', desc:'Proyectos especiales', color:'var(--amber)', bgColor:'var(--amber-bg)', submods:[] },
    vigilancia: { name:'Vigilancia', desc:'Seguridad y accesos', color:'#7C3AED', bgColor:'rgba(124,58,237,0.08)', submods:[] }
};
  /* ════ PARTE 2: LÓGICA DE DATOS Y RENDERIZADO ════ */

const CASETAS_MENSUAL_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSb8jHJ_Fqmp-Pxvy1Y8Frwc_uj49tWkcgVydTBUe1kBK7e1xte_1s5YLvx1UXetA/pub?gid=1168469221&single=true&output=csv';
const CASETAS_COMPARATIVO_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSb8jHJ_Fqmp-Pxvy1Y8Frwc_uj49tWkcgVydTBUe1kBK7e1xte_1s5YLvx1UXetA/pub?gid=439879445&single=true&output=csv';
const SHEETS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSgRgBjIySNNLYySfwSdEXuHJcu-vwg1ZK-mQb6HQZm8xXAex31UOtJaVZlnwzZGA/pub?gid=241439534&single=true&output=csv';
const VIAJES_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQXHv7eviqTWjlZLJLhnvKtACyFtBMYT2LbnahX5qzju4y_5rB0crQB1LC6QfpCWw/pub?gid=1801163127&single=true&output=csv';

Chart.register(ChartDataLabels);

/* UTILS ORIGINALES */
function parseMoney(v){
    if(!v && v!==0) return 0;
    let s=(v||'0').toString().trim().replace(/[$\s]/g,'').replace(/\r/g,'');
    return parseFloat(s.replace(/,/g,'')) || 0;
}

function normDate(raw){
    if(!raw) return null;
    const s=raw.toString().trim();
    if(/^\d{4}-\d{1,2}-\d{1,2}$/.test(s)) return s;
    const d=new Date(s);
    return isNaN(d) ? null : d.toISOString().split('T')[0];
}

/* RENDERIZADO DE CASETAS */
async function renderCasetas(container){
    container.innerHTML=`<div class="loading-state"><div class="spinner"></div>Cargando datos de casetas...</div>`;
    try {
        const [resM, resC] = await Promise.all([
            fetch(CASETAS_MENSUAL_URL + '&cb=' + Date.now()),
            fetch(CASETAS_COMPARATIVO_URL + '&cb=' + Date.now())
        ]);
        const txtM = await resM.text();
        const mensual = parseCSV(txtM).map(r => ({
            mes: r.MES || r.Mes,
            c23: parseMoney(r['2023']),
            c24: parseMoney(r['2024']),
            c25: parseMoney(r['2025']),
            c26: parseMoney(r['2026']),
            estatus: r.Estatus || (parseMoney(r['2026']) < parseMoney(r['2025']) ? 'Ahorro' : 'Gasto')
        })).filter(r => r.mes);

        container.innerHTML = `
            <div class="submod-tabs">
                <button class="submod-tab active" onclick="this.parentElement.nextElementSibling.style.display='block'; this.parentElement.nextElementSibling.nextElementSibling.style.display='none'">Anual</button>
                <button class="submod-tab" onclick="this.parentElement.nextElementSibling.style.display='none'; this.parentElement.nextElementSibling.nextElementSibling.style.display='block'">Por Unidad</button>
            </div>
            <div id="casetas-anual">
                <div class="casetas-summary-grid">
                    <div class="cs-card" style="--cs-c:var(--blue)"><div class="lbl">Total 2024</div><div class="val">$${mensual.reduce((a,b)=>a+b.c24,0).toLocaleString()}</div></div>
                    <div class="cs-card" style="--cs-c:var(--amber)"><div class="lbl">Total 2025</div><div class="val">$${mensual.reduce((a,b)=>a+b.c25,0).toLocaleString()}</div></div>
                    <div class="cs-card" style="--cs-c:var(--red)"><div class="lbl">Total 2026</div><div class="val">$${mensual.reduce((a,b)=>a+b.c26,0).toLocaleString()}</div></div>
                </div>
                <div class="chart-box full"><canvas id="chart-casetas-bar" height="300"></canvas></div>
            </div>
            <div id="casetas-unidad" style="display:none">
                <div class="loading-state">Cargando detalle de unidades...</div>
            </div>
        `;

        setTimeout(() => {
            new Chart(document.getElementById('chart-casetas-bar'), {
                type: 'bar',
                data: {
                    labels: mensual.map(r => r.mes),
                    datasets: [
                        { label: '2024', data: mensual.map(r => r.c24), backgroundColor: 'rgba(26,95,160,0.5)' },
                        { label: '2025', data: mensual.map(r => r.c25), backgroundColor: 'rgba(184,122,16,0.5)' },
                        { label: '2026', data: mensual.map(r => r.c26), backgroundColor: 'rgba(192,21,42,0.8)' }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }, 100);
    } catch(e) { container.innerHTML = "Error cargando Casetas."; }
}

/* RENDERIZADO DE CARGAS */
async function renderCargas(container){
    container.innerHTML=`<div class="loading-state"><div class="spinner"></div>Cargando cargas...</div>`;
    try {
        const res = await fetch(SHEETS_URL + '&cb=' + Date.now());
        const data = parseCSV(await res.text());
        const rows = data.map(r => ({
            fecha: normDate(r.Fecha),
            ant: parseInt(r.Anticipadas) || 0,
            noc: parseInt(r.Nocturnas) || 0
        })).filter(r => r.fecha);

        const tAnt = rows.reduce((a,b)=>a+b.ant, 0);
        const tNoc = rows.reduce((a,b)=>a+b.noc, 0);

        container.innerHTML = `
            <div class="kpi-row">
                <div class="ckpi" style="--ck-color:var(--blue)"><div class="lbl">Anticipadas</div><div class="val">${tAnt}</div></div>
                <div class="ckpi" style="--ck-color:var(--red)"><div class="lbl">Nocturnas</div><div class="val">${tNoc}</div></div>
                <div class="ckpi" style="--ck-color:var(--green)"><div class="lbl">Total</div><div class="val">${tAnt+tNoc}</div></div>
            </div>
            <div class="chart-box full"><canvas id="chart-cargas" height="300"></canvas></div>
        `;

        setTimeout(() => {
            new Chart(document.getElementById('chart-cargas'), {
                type: 'line',
                data: {
                    labels: rows.map(r => r.fecha),
                    datasets: [
                        { label: 'Anticipadas', data: rows.map(r => r.ant), borderColor: 'var(--blue)', fill: false },
                        { label: 'Nocturnas', data: rows.map(r => r.noc), borderColor: 'var(--red)', fill: false }
                    ]
                }
            });
        }, 100);
    } catch(e) { container.innerHTML = "Error cargando Cargas."; }
}
  /* ════ PARTE 3: COLABORADORES, SEGURIDAD Y CIERRE ════ */

async function renderColaboradores(container) {
    container.innerHTML = `<div class="loading-state"><div class="spinner"></div>Cargando colaboradores...</div>`;
    try {
        const res = await fetch(VIAJES_URL + '&cb=' + Date.now());
        const raw = parseCSV(await res.text());
        const data = raw.map(r => ({
            nombre: r.Colaborador || r.Nombre,
            unidad: r.Unidad,
            local: parseInt(r.Local) || 0,
            foraneo: parseInt(r.Foraneo) || 0,
            total: parseInt(r.Total) || 0,
            pct: parseFloat((r['% DE VIAJES'] || '0').replace('%', '')) || 0
        })).filter(r => r.nombre);

        container.innerHTML = `
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr><th>Nombre</th><th>Unidad</th><th class="num">Local</th><th class="num">Foráneo</th><th class="num">Total</th><th class="center">Cumplimiento</th></tr>
                    </thead>
                    <tbody>
                        ${data.map(r => `
                            <tr>
                                <td><b>${r.nombre}</b></td>
                                <td><span class="unidad-badge unidad-camion">${r.unidad}</span></td>
                                <td class="num">${r.local}</td>
                                <td class="num">${r.foraneo}</td>
                                <td class="num"><b>${r.total}</b></td>
                                <td class="center">
                                    <div class="pctbar-wrap">
                                        <div class="pctbar-track"><div class="pctbar-fill" style="width:${Math.min(r.pct, 100)}%; background:${r.pct >= 100 ? 'var(--green)' : 'var(--amber)'}"></div></div>
                                        <span class="pctbar-lbl">${r.pct}%</span>
                                    </div>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
    } catch (e) { container.innerHTML = "Error cargando Colaboradores."; }
}

/* ════ PANEL DE SEGURIDAD (ADMIN) ════ */
function openSecurity() {
    document.getElementById('page-home').classList.remove('active');
    document.getElementById('page-detail').classList.add('active');
    document.getElementById('bc-current').textContent = "Seguridad";
    document.getElementById('detail-name').textContent = "Gestión de Usuarios";
    
    let userRows = appUsers.map((u, idx) => `
        <tr>
            <td><b>${u.name}</b></td>
            <td>${u.email}</td>
            <td><span class="pill ${u.role === 'admin' ? 'pill-red' : 'pill-blue'}">${u.role.toUpperCase()}</span></td>
            <td><small>${u.permisos.join(', ')}</small></td>
            <td class="center">
                ${u.email !== activeUser.email ? `<button onclick="removeUser(${idx})" class="pill-red" style="border:none; cursor:pointer; padding:5px 10px">Borrar</button>` : '---'}
            </td>
        </tr>
    `).join('');

    document.getElementById('detail-body').innerHTML = `
        <div class="chart-box full">
            <div class="chart-title">Crear Nuevo Usuario</div>
            <div class="filters-bar">
                <div class="filter-group"><span class="filter-label">Nombre</span><input type="text" id="add-name" class="filter-input"></div>
                <div class="filter-group"><span class="filter-label">Email</span><input type="email" id="add-email" class="filter-input"></div>
                <div class="filter-group"><span class="filter-label">Password</span><input type="text" id="add-pass" class="filter-input"></div>
                <div class="filter-group"><span class="filter-label">Módulos (ej: logistica, maquilas)</span><input type="text" id="add-perms" class="filter-input" placeholder="logistica"></div>
                <button class="filter-btn" onclick="saveNewUser()">+ Registrar</button>
            </div>
        </div>
        <div class="table-wrap">
            <table>
                <thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Permisos</th><th class="center">Acción</th></tr></thead>
                <tbody>${userRows}</tbody>
            </table>
        </div>
    `;
}

function saveNewUser() {
    const n = document.getElementById('add-name').value, e = document.getElementById('add-email').value, p = document.getElementById('add-pass').value;
    const m = document.getElementById('add-perms').value.toLowerCase().split(',').map(s => s.trim()).filter(s => s);
    if(!n || !e || !p) return alert("Faltan campos");
    appUsers.push({ name: n, email: e, pass: p, role: 'user', permisos: m });
    localStorage.setItem('fisfiber_users', JSON.stringify(appUsers));
    openSecurity();
}

function removeUser(idx) {
    if(confirm("¿Eliminar acceso a este usuario?")) {
        appUsers.splice(idx, 1);
        localStorage.setItem('fisfiber_users', JSON.stringify(appUsers));
        openSecurity();
    }
}

/* ════ NAVEGACIÓN Y RELOJ ════ */
function updateClock(){
    const n=new Date();
    const clk = document.getElementById('clock');
    if(clk) clk.textContent=n.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const tbd = document.getElementById('topbar-date');
    if(tbd) tbd.textContent=n.toLocaleDateString('es-MX',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
}
setInterval(updateClock,1000);

function renderMenu() {
    const nav = document.getElementById('sidebar-nav-content');
    let html = `<div class="nav-section">Principal</div><div class="nav-item active" onclick="showHome()">🏠 Inicio</div><div class="nav-section">Áreas</div>`;
    Object.keys(areas).forEach(key => {
        if (activeUser.permisos.includes(key)) html += `<div class="nav-item" onclick="openArea('${key}')">📊 ${areas[key].name}</div>`;
    });
    if (activeUser.role === 'admin') html += `<div class="nav-section">Sistema</div><div class="nav-item" onclick="openSecurity()">🛡️ Seguridad</div>`;
    nav.innerHTML = html;
}

function renderHome() {
    const grid = document.getElementById('home-grid');
    let html = '';
    let count = 0;
    Object.keys(areas).forEach(key => {
        if (activeUser.permisos.includes(key)) {
            const a = areas[key];
            html += `<div class="area-card" style="border-top:4px solid ${a.color}" onclick="openArea('${key}')"><h3>${a.name}</h3><p>${a.desc}</p></div>`;
            count++;
        }
    });
    grid.innerHTML = html;
    document.getElementById('count-areas').textContent = count;
}

function openArea(key) {
    const a = areas[key];
    document.getElementById('page-home').classList.remove('active');
    document.getElementById('page-detail').classList.add('active');
    document.getElementById('bc-current').textContent = a.name;
    document.getElementById('detail-name').textContent = a.name;
    if(a.submods.length) {
        const tabs = a.submods.map((s,i)=>`<button class="submod-tab${i===0?' active':''}" onclick="this.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('active')); this.classList.add('active'); loadSub('${key}','${s.id}')">${s.label}</button>`).join('');
        document.getElementById('detail-body').innerHTML = `<div class="submod-tabs">${tabs}</div><div id="sub-panel"></div>`;
        loadSub(key, a.submods[0].id);
    } else {
        document.getElementById('detail-body').innerHTML = "Módulo sin sub-módulos activos.";
    }
}

function loadSub(akey, sid) {
    const s = areas[akey].submods.find(x => x.id === sid);
    s.render(document.getElementById('sub-panel'));
}

function showHome() {
    document.getElementById('page-detail').classList.remove('active');
    document.getElementById('page-home').classList.add('active');
    document.getElementById('bc-current').textContent = "Resumen";
}

function parseCSV(t) {
    const lines = t.trim().split('\n').filter(l => l.trim());
    const hdr = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
    return lines.slice(1).map(line => {
        const v = line.split(',');
        const o = {};
        hdr.forEach((h, i) => o[h] = (v[i] || '').trim().replace(/^"|"$/g,''));
        return o;
    });
}

window.onload = () => {
    const session = localStorage.getItem('fisfiber_session');
    if (session) {
        activeUser = JSON.parse(session);
        startApp();
    }
};

</script>
</body>
</html>
