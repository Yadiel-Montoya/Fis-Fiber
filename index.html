<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIS FIBER · Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="js/users.js"></script>
<script src="js/auth.js"></script>
<style>
:root{--red:#C0152A;--red2:#9E0E20;--off:#F7F5F4;--ink:#1A0A0C;--ink3:#9A7078;--border:#E8DCDE}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Outfit',sans-serif}
@keyframes loginBg{
  0%  {background-position:0% 50%}
  50% {background-position:100% 50%}
  100%{background-position:0% 50%}
}
body{
  display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:linear-gradient(-50deg,#0a0508,#1a0008,#2a0510,#0d0205,#1f0612,#0a0508);
  background-size:400% 400%;
  animation:loginBg 16s ease infinite;
}
.login-wrap{width:100%;max-width:420px;padding:1.5rem}
/* FFISA brand en login */
.brand{text-align:center;margin-bottom:2.5rem}
.ffisa-login{display:inline-flex;align-items:center;gap:16px;margin-bottom:1.1rem}
.ffisa-login-circle{
  width:68px;height:68px;border-radius:50%;
  background:radial-gradient(circle at 36% 34%,#fff 0%,#f5eced 55%,#e0cdd0 100%);
  display:flex;align-items:center;justify-content:center;
  font-size:34px;font-weight:900;font-family:'Outfit',sans-serif;color:#C0152A;
  box-shadow:0 8px 32px rgba(192,21,42,0.55),inset 0 1px 0 rgba(255,255,255,0.95);
  flex-shrink:0;
}
.ffisa-login-text{text-align:left;line-height:1}
.ffisa-login-name{font-size:34px;font-weight:900;letter-spacing:-.03em;font-family:'Outfit',sans-serif}
.ffisa-login-ff{color:#fff}
.ffisa-login-isa{color:rgba(255,255,255,0.28);font-weight:300}
.ffisa-login-sub{font-size:10px;font-style:italic;font-family:'JetBrains Mono',monospace;color:rgba(255,255,255,0.3);margin-top:6px;letter-spacing:.04em}
.brand-sub{font-size:11px;font-family:'JetBrains Mono',monospace;color:rgba(255,255,255,0.22);margin-top:6px;letter-spacing:.15em;text-transform:uppercase}
.card{
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;padding:2rem;backdrop-filter:blur(16px);
}
.card-title{font-size:17px;font-weight:600;color:#fff;margin-bottom:.3rem}
.card-sub{font-size:13px;color:rgba(255,255,255,0.35);margin-bottom:1.75rem}
.field{margin-bottom:1.25rem}
.field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,0.4);margin-bottom:6px}
.field input{
  width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);
  border-radius:10px;padding:11px 14px;font-size:14px;color:#fff;font-family:'Outfit',sans-serif;
  outline:none;transition:border-color .18s,background .18s;
}
.field input::placeholder{color:rgba(255,255,255,0.2)}
.field input:focus{border-color:rgba(192,21,42,0.7);background:rgba(192,21,42,0.06)}
.btn-login{
  width:100%;background:var(--red);border:none;border-radius:10px;
  padding:13px;font-size:15px;font-weight:700;color:#fff;font-family:'Outfit',sans-serif;
  cursor:pointer;transition:all .18s;box-shadow:0 4px 16px rgba(192,21,42,0.4);
  margin-top:.25rem;
}
.btn-login:hover{background:var(--red2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(192,21,42,0.5)}
.btn-login:active{transform:translateY(0)}
.btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none}
.error-msg{
  background:rgba(192,21,42,0.12);border:1px solid rgba(192,21,42,0.3);
  border-radius:8px;padding:10px 14px;font-size:13px;color:#ff8896;
  margin-bottom:1rem;display:none;
}
.error-msg.show{display:block}
.footer-note{text-align:center;margin-top:1.5rem;font-size:11px;font-family:'JetBrains Mono',monospace;color:rgba(255,255,255,0.15)}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="brand">
    <div class="ffisa-login">
      <div class="ffisa-login-circle">F</div>
      <div class="ffisa-login-text">
        <div class="ffisa-login-name"><span class="ffisa-login-ff">FF</span><span class="ffisa-login-isa">ISA</span></div>
        <div class="ffisa-login-sub">Fis Fiber Industries</div>
      </div>
    </div>
    <div class="brand-sub">Sistema de Indicadores · Acceso Restringido</div>
  </div>

  <div class="card">
    <div class="card-title">Iniciar sesión</div>
    <div class="card-sub">Ingresa tus credenciales para continuar</div>

    <div class="error-msg" id="err-msg">Usuario o contraseña incorrectos.</div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="field">
        <label>Usuario</label>
        <input type="text" id="inp-user" placeholder="tu.usuario" autocomplete="username" required>
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="inp-pass" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login" id="btn-login">Entrar al sistema</button>
    </form>
  </div>

  <div class="footer-note">FIS FIBER · Control Operativo · Acceso restringido</div>
</div>

<script>
// Si ya tiene sesión activa, redirige directo a la app
if (sessionStorage.getItem('fis_session')) {
  window.location.replace('app.html');
}

function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-login');
  const err = document.getElementById('err-msg');
  const user = document.getElementById('inp-user').value;
  const pass = document.getElementById('inp-pass').value;

  btn.disabled = true;
  btn.textContent = 'Verificando…';
  err.classList.remove('show');

  setTimeout(() => {
    const result = fisLogin(user, pass);
    if (result.ok) {
      window.location.replace('app.html');
    } else {
      err.textContent = result.error;
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Entrar al sistema';
      document.getElementById('inp-pass').value = '';
      document.getElementById('inp-pass').focus();
    }
  }, 400);
}
</script>
</body>
</html>
